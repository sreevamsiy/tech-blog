{{ define "main" }}
  <section class="page-heading">
    <h1>{{ .Title }}</h1>
  </section>

  <section class="post-list">
    {{ range .Pages }}
      <article class="post-row">
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p>{{ .Description | default .Summary }}</p>
        <a class="text-link" href="{{ .RelPermalink }}">Read blog</a>
      </article>
    {{ else }}
      <article class="empty-state">
        <h2>No posts yet.</h2>
        <p>Start with the blog architecture and document each Terraform layer as it lands.</p>
      </article>
    {{ end }}
  </section>
{{ end }}
